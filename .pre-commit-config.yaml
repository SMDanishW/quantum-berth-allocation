# Pre-commit hooks: lint + type-check. Install with `uv run pre-commit install`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
